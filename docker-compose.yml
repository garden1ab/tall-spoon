services:
  krea2-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krea2-local-ui
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - CUDA_MODULE_LOADING=LAZY
      - TORCHINDUCTOR_CACHE_DIR=/workspace/.cache/torchinductor
      - KREA2_MAX_CACHED_PIPELINES=1
    volumes:
      - ./checkpoints:/workspace/checkpoints
      - ./outputs:/workspace/outputs
      - hf-cache:/workspace/.cache/huggingface
      - torchinductor-cache:/workspace/.cache/torchinductor
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "16gb"
    ipc: host

volumes:
  hf-cache:
  torchinductor-cache:
